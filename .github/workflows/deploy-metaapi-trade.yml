name: Deploy metaapi-trade

# Deploy VETËM i metaapi-trade (ekzekutimi i trade-ve + çmimi/pozicionet live nga MT5).
# verify_jwt=true (kërkon JWT të përdoruesit). Nxitet manualisht. Kërkon SUPABASE_ACCESS_TOKEN.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy metaapi-trade (verify_jwt=true)
        run: supabase functions deploy metaapi-trade --project-ref zwyuscgqacfpjafznybg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
