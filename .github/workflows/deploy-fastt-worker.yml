name: Deploy FastT worker (Fly.io)

# Deploy i worker-it always-on (FastT) te Fly.io.
# Worker-i mban lidhjen WebSocket me MetaApi 24/7 dhe tregton në kohë reale (~100ms) —
# prandaj ndryshimet e logjikës (strategy.js/index.js) HYJNË NË FUQI vetëm pas këtij deploy-i.
#
# Nxitet:
#   • automatikisht kur ndryshon kodi i worker-it në `main` (që logjika të mos mbetet prapa),
#   • ose manualisht (workflow_dispatch) — edhe nga një degë, për deploy të menjëhershëm.
#
# Kërkon NJË sekret të repos: FLY_API_TOKEN
#   merre me:  fly tokens create deploy -a fastt-worker
#   shtoje te: GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#
# Sekretet runtime (METAAPI_TOKEN, SUPABASE_*, FASTT_USER_ID, ...) janë vendosur tashmë te
# Fly (fly secrets) dhe RUHEN mes deploy-eve — ky workflow vetëm ribën imazhin me kodin e ri.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'worker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy te Fly (build remote, pa Docker lokal)
        run: flyctl deploy --remote-only --config fly.toml --dockerfile Dockerfile
        working-directory: worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
