name: Deploy auto-trade-runner

# Deploy-i i robotit live bëhet nga GitHub (runner-i i tij e arrin api.supabase.com).
# Nxitet manualisht (workflow_dispatch) — kontroll i plotë para se të preket roboti real.
# Kërkon sekretin e repos: SUPABASE_ACCESS_TOKEN (token nga supabase.com/dashboard/account/tokens).

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Deploy auto-trade-runner (verify_jwt=false për cron)
        run: supabase functions deploy auto-trade-runner --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy metaapi-trade (verify_jwt=true — kërkon JWT të përdoruesit)
        run: supabase functions deploy metaapi-trade --project-ref zwyuscgqacfpjafznybg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy engine-scan (verify_jwt=false — cron me x-cron-secret)
        run: supabase functions deploy engine-scan --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy web-push-send (verify_jwt=false — internal service-role + user JWT)
        run: supabase functions deploy web-push-send --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy expert-room (verify_jwt=false — cron x-cron-secret + admin JWT internal)
        run: supabase functions deploy expert-room --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy signal-eval (verify_jwt=false — cron x-cron-secret)
        run: supabase functions deploy signal-eval --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy update-prices (verify_jwt=false — cron x-cron-secret)
        run: supabase functions deploy update-prices --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy metaapi-watchdog (verify_jwt=false — cron x-cron-secret)
        run: supabase functions deploy metaapi-watchdog --project-ref zwyuscgqacfpjafznybg --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
