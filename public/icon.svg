<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2536"/>
      <stop offset="0.55" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- candlesticks (bullish, ascending) -->
  <g stroke="url(#gold)" stroke-width="16" stroke-linecap="round">
    <line x1="150" y1="300" x2="150" y2="392"/>
    <line x1="226" y1="250" x2="226" y2="360"/>
    <line x1="302" y1="206" x2="302" y2="330"/>
  </g>
  <g fill="url(#gold)" opacity="0.30">
    <rect x="132" y="318" width="36" height="56" rx="8"/>
    <rect x="208" y="276" width="36" height="60" rx="8"/>
    <rect x="284" y="232" width="36" height="64" rx="8"/>
  </g>
  <!-- ascending trend line + arrowhead -->
  <g filter="url(#glow)">
    <polyline points="120,356 198,300 274,330 356,224 420,160"
      fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M420 160 L362 168 M420 160 L412 218" fill="none"
      stroke="url(#gold)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>